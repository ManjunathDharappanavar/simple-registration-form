<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Registration</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <form id="registrationForm" class="glass-form" novalidate>
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Join our premium community today.</p>
            </div>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="off" required>
                <span class="error-message" id="usernameError"></span>
            </div>
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="off" required>
                <span class="error-message" id="emailError"></span>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
                <span class="error-message" id="passwordError"></span>
            </div>
            
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                <span class="error-message" id="confirmPasswordError"></span>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Sign Up</span>
                <div class="loader" id="submitLoader"></div>
            </button>
            
            <div class="form-footer">
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
